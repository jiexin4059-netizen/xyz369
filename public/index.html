<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公司账目管理系统</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      color: #1f2937;
      background: linear-gradient(135deg, #eef2ff 0%, #f8fafc 55%, #e0f2fe 100%);
    }
    .page { width: min(1100px, calc(100% - 32px)); margin: 0 auto; padding: 40px 0; }
    .hidden { display: none !important; }
    .header { margin-bottom: 24px; text-align: center; }
    .header h1 { margin: 0 0 8px; font-size: 32px; color: #0f172a; }
    .header p { margin: 0; color: #64748b; }
    .cloud-badge {
      display: inline-block; margin-top: 10px; padding: 6px 12px;
      border-radius: 999px; background: #dcfce7; color: #166534; font-size: 13px; font-weight: 700;
    }
    .card {
      margin-bottom: 24px; padding: 24px; border: 1px solid #e2e8f0; border-radius: 18px;
      background: rgba(255,255,255,0.9); box-shadow: 0 18px 45px rgba(15,23,42,0.08);
    }
    .login-card { width: min(460px, calc(100% - 32px)); margin: 60px auto; }
    .login-card h2, .section-title { margin: 0 0 8px; color: #0f172a; }
    .login-card h2 { text-align: center; }
    .subtitle { margin: 0 0 24px; text-align: center; color: #64748b; font-size: 14px; }
    .form-field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .form-field.compact { margin-bottom: 0; }
    label { font-weight: 700; color: #334155; }
    input, select {
      width: 100%; padding: 12px 14px; border: 1px solid #cbd5e1; border-radius: 12px;
      font-size: 15px; background: #fff; outline: none;
    }
    input:focus, select:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.15); }
    .form-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; align-items: end; }
    .form-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; align-items: end; }
    .button-row { display: flex; gap: 12px; margin-top: 18px; flex-wrap: wrap; }
    button {
      border: 0; border-radius: 12px; padding: 12px 18px; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover { transform: translateY(-1px); box-shadow: 0 10px 20px rgba(15,23,42,0.12); }
    button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .primary-button { color: #fff; background: #2563eb; }
    .secondary-button { color: #334155; background: #e2e8f0; }
    .danger-button { color: #fff; background: #dc2626; }
    .success-button { color: #fff; background: #16a34a; }
    .full-width-button { width: 100%; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
    .top-actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .user-info {
      padding: 12px 18px; border-radius: 14px; background: rgba(255,255,255,0.9);
      border: 1px solid #e2e8f0; box-shadow: 0 8px 20px rgba(15,23,42,0.06);
    }
    .user-info strong { color: #0f172a; }
    .user-info span { color: #64748b; font-size: 14px; }
    .company-switcher { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .company-switcher select { max-width: 280px; }
    .bank-tabs { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; }
    .bank-tab {
      padding: 10px 18px; border-radius: 999px; border: 1px solid #cbd5e1;
      background: #fff; color: #334155; font-weight: 700; cursor: pointer;
    }
    .bank-tab.active { background: #2563eb; border-color: #2563eb; color: #fff; }
    .bank-title { margin: 0 0 16px; font-size: 20px; color: #0f172a; }
    .summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
    .summary-item {
      padding: 18px; border-radius: 16px; background: #fff; border: 1px solid #e2e8f0;
      box-shadow: 0 12px 28px rgba(15,23,42,0.06);
    }
    .summary-item span { display: block; margin-bottom: 8px; color: #64748b; font-size: 14px; }
    .summary-item strong { font-size: 24px; }
    .income { color: #16a34a; } .expense { color: #dc2626; } .balance { color: #2563eb; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 680px; }
    th, td { padding: 14px 12px; border-bottom: 1px solid #e2e8f0; text-align: left; }
    th { background: #f8fafc; color: #475569; font-size: 14px; }
    .empty { padding: 28px 12px; text-align: center; color: #94a3b8; }
    .delete-record { padding: 8px 12px; font-size: 13px; }
    .login-hint, .info-box {
      margin-top: 20px; padding: 14px; border-radius: 12px; background: #f8fafc;
      border: 1px solid #e2e8f0; font-size: 13px; color: #64748b; line-height: 1.7;
    }
    .login-hint code { padding: 2px 6px; border-radius: 6px; background: #e2e8f0; }
    .error-message {
      margin-bottom: 16px; padding: 12px 14px; border-radius: 12px;
      background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c; font-size: 14px;
    }
    .company-list { display: grid; gap: 12px; margin-top: 20px; }
    .company-option {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 18px; border: 1px solid #e2e8f0; border-radius: 14px; background: #fff; cursor: pointer;
    }
    .company-option:hover { border-color: #2563eb; box-shadow: 0 8px 20px rgba(37,99,235,0.12); }
    .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .settings-panel { padding: 18px; border: 1px solid #e2e8f0; border-radius: 14px; background: #f8fafc; }
    .settings-panel h3 { margin: 0 0 14px; font-size: 16px; }
    .tag-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .tag {
      display: inline-flex; align-items: center; gap: 6px; padding: 6px 10px;
      border-radius: 999px; background: #e2e8f0; color: #334155; font-size: 13px;
    }
    .tag button { padding: 0 4px; background: transparent; color: #64748b; font-size: 14px; box-shadow: none; }
    .tabs-nav { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .tab-button { padding: 10px 16px; border-radius: 10px; background: #e2e8f0; color: #334155; }
    .tab-button.active { background: #2563eb; color: #fff; }
    @media (max-width: 900px) {
      .form-grid, .form-grid-3, .summary, .settings-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 620px) {
      .page { width: min(100% - 20px, 1100px); padding: 24px 0; }
      .form-grid, .form-grid-3, .summary, .settings-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <section id="loginPage" class="login-card card">
    <h2>公司账目管理系统</h2>
    <p class="subtitle">云端版 · 多人共用数据</p>
    <div id="loginError" class="error-message hidden"></div>
    <form id="loginForm">
      <div class="form-field">
        <label for="loginId">登入账号</label>
        <input type="text" id="loginId" placeholder="例如：admin" required autocomplete="username">
      </div>
      <div class="form-field">
        <label for="password">密码</label>
        <input type="password" id="password" placeholder="请输入密码" required autocomplete="current-password">
      </div>
      <button type="submit" class="primary-button full-width-button">登入</button>
    </form>
    <div class="login-hint">
      <strong>演示账号：</strong><br>
      登入账号 <code>admin</code>，密码 <code>123456</code><br>
      可访问多家公司，数据保存在云端服务器
    </div>
  </section>

  <section id="companyPage" class="login-card card hidden">
    <h2>选择公司</h2>
    <p class="subtitle">你的账号可访问以下公司</p>
    <div id="companyList" class="company-list"></div>
    <div class="button-row">
      <button type="button" id="createCompanyOpenButton" class="primary-button">+ 创建新公司</button>
      <button type="button" id="backToLoginButton" class="secondary-button">返回登入</button>
    </div>
    <form id="createCompanyForm" class="hidden" style="margin-top:20px;">
      <div class="form-field">
        <label for="newCompanyName">新公司名称</label>
        <input type="text" id="newCompanyName" placeholder="例如：北京分公司" required>
      </div>
      <div class="button-row">
        <button type="submit" class="primary-button">确认创建</button>
        <button type="button" id="createCompanyCancelButton" class="secondary-button">取消</button>
      </div>
    </form>
  </section>

  <main id="mainPage" class="page hidden">
    <div class="top-bar">
      <div class="user-info">
        <strong id="userName">员工</strong><br>
        <span>登入账号：<span id="userLoginId"></span> · 员工号：<span id="userEmployeeId"></span></span>
      </div>
      <div class="top-actions">
        <button type="button" id="settingsButton" class="secondary-button hidden">系统设置</button>
        <button type="button" id="logoutButton" class="secondary-button">退出登入</button>
      </div>
    </div>

    <div class="company-switcher">
      <label for="companySelect">当前公司</label>
      <select id="companySelect"></select>
      <button type="button" id="createCompanyMainButton" class="secondary-button">+ 创建新公司</button>
    </div>

    <nav class="tabs-nav">
      <button type="button" class="tab-button active" data-tab="records">单据录入</button>
      <button type="button" class="tab-button" data-tab="settings" id="settingsTabButton">系统设置</button>
    </nav>

    <div id="recordsTab">
      <header class="header">
        <h1>单据录入</h1>
        <p>选择银行后录入单据，所有同事可实时共用云端数据</p>
        <div class="cloud-badge">☁️ 云端同步 · 多人共用</div>
      </header>
      <nav class="bank-tabs" id="bankTabs"></nav>
      <section class="card">
        <h2 class="bank-title" id="currentBankTitle">当前银行</h2>
        <form id="recordForm">
          <div class="form-grid">
            <div class="form-field compact"><label for="time">时间</label><input type="datetime-local" id="time" required></div>
            <div class="form-field compact"><label for="ref">Ref（参考号）</label><input type="text" id="ref" placeholder="例如：TXN20240629001" required></div>
            <div class="form-field compact"><label for="inAmount">In（收入）</label><input type="number" id="inAmount" min="0" step="0.01" placeholder="0.00"></div>
            <div class="form-field compact"><label for="outAmount">Out（支出）</label><input type="number" id="outAmount" min="0" step="0.01" placeholder="0.00"></div>
          </div>
          <div class="button-row">
            <button type="submit" class="primary-button">添加单据</button>
            <button type="reset" class="secondary-button">清空输入</button>
            <button type="button" id="exportBankButton" class="success-button">导出本银行 Excel</button>
            <button type="button" id="exportAllButton" class="success-button">导出本公司全部 Excel</button>
            <button type="button" id="clearBankButton" class="danger-button">删除本银行全部记录</button>
          </div>
        </form>
      </section>
      <section class="summary">
        <div class="summary-item"><span>总收入 (In)</span><strong id="totalIn" class="income">¥0.00</strong></div>
        <div class="summary-item"><span>总支出 (Out)</span><strong id="totalOut" class="expense">¥0.00</strong></div>
        <div class="summary-item"><span>结余</span><strong id="balance" class="balance">¥0.00</strong></div>
      </section>
      <section class="card">
        <div class="table-wrap">
          <table>
            <thead><tr><th>时间</th><th>Ref</th><th>In（收入）</th><th>Out（支出）</th><th>操作</th></tr></thead>
            <tbody id="recordList"></tbody>
          </table>
        </div>
      </section>
    </div>

    <div id="settingsTab" class="hidden">
      <header class="header">
        <h1>系统设置</h1>
        <p>管理公司员工、银行和登入账号</p>
      </header>
      <section class="card">
        <h2 class="section-title">创建新公司</h2>
        <p class="subtitle" style="text-align:left;margin-bottom:16px;">创建后你将自动成为该公司的管理员，并可在顶部切换公司</p>
        <form id="createCompanySettingsForm">
          <div class="form-grid-3">
            <div class="form-field compact">
              <label for="settingsCompanyName">公司名称</label>
              <input type="text" id="settingsCompanyName" placeholder="例如：北京分公司" required>
            </div>
          </div>
          <div class="button-row"><button type="submit" class="primary-button">创建新公司</button></div>
        </form>
      </section>
      <section class="card">
        <div class="settings-grid">
          <div class="settings-panel">
            <h3>添加员工</h3>
            <form id="addEmployeeForm">
              <div class="form-field"><label for="newEmployeeId">员工号</label><input type="text" id="newEmployeeId" placeholder="EMP004" required></div>
              <div class="form-field"><label for="newEmployeeName">姓名</label><input type="text" id="newEmployeeName" placeholder="赵六" required></div>
              <div class="form-field">
                <label for="newEmployeeRole">角色</label>
                <select id="newEmployeeRole"><option value="user">普通员工</option><option value="admin">管理员</option></select>
              </div>
              <button type="submit" class="primary-button">添加员工</button>
            </form>
            <div class="tag-list" id="employeeList"></div>
          </div>
          <div class="settings-panel">
            <h3>添加银行</h3>
            <form id="addBankForm">
              <div class="form-field"><label for="newBankName">银行名称</label><input type="text" id="newBankName" placeholder="交通银行" required></div>
              <button type="submit" class="primary-button">添加银行</button>
            </form>
            <div class="tag-list" id="bankList"></div>
          </div>
        </div>
      </section>
      <section class="card">
        <h2 class="section-title">创建登入账号</h2>
        <form id="addAccountForm">
          <div class="form-grid-3">
            <div class="form-field compact"><label for="newLoginId">登入账号</label><input type="text" id="newLoginId" required></div>
            <div class="form-field compact"><label for="newLoginPassword">密码</label><input type="password" id="newLoginPassword" required></div>
            <div class="form-field compact"><label for="newLoginEmployeeId">对应员工号</label><input type="text" id="newLoginEmployeeId" required></div>
          </div>
          <div class="button-row"><button type="submit" class="primary-button">创建登入账号</button></div>
        </form>
      </section>
    </div>
  </main>

  <script>
    const TOKEN_KEY = "companyAccountToken";
    const SESSION_KEY = "companyAccountSession";

    let token = sessionStorage.getItem(TOKEN_KEY);
    let session = null;
    let currentCompany = null;
    let currentRecords = [];
    let currentBank = null;
    let pendingAccount = null;

    const $ = (id) => document.getElementById(id);

    async function api(path, options = {}) {
      const headers = { "Content-Type": "application/json", ...(options.headers || {}) };
      if (token) headers.Authorization = "Bearer " + token;

      const response = await fetch(path, { ...options, headers });
      const data = await response.json().catch(() => ({}));

      if (!response.ok) {
        if (response.status === 401) {
          logout();
        }
        throw new Error(data.error || "请求失败");
      }
      return data;
    }

    function saveToken(value) {
      token = value;
      sessionStorage.setItem(TOKEN_KEY, value);
    }

    function saveSession(value) {
      session = value;
      sessionStorage.setItem(SESSION_KEY, JSON.stringify(value));
    }

    function loadSession() {
      try { return JSON.parse(sessionStorage.getItem(SESSION_KEY)); } catch { return null; }
    }

    function formatMoney(n) { return "¥" + Number(n).toFixed(2); }

    function formatDateTime(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      const p = (n) => String(n).padStart(2, "0");
      return date.getFullYear() + "-" + p(date.getMonth() + 1) + "-" + p(date.getDate()) + " " + p(date.getHours()) + ":" + p(date.getMinutes());
    }

    function setNowAsDefaultTime() {
      const now = new Date();
      now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
      $("time").value = now.toISOString().slice(0, 16);
    }

    function hideAllPages() {
      $("loginPage").classList.add("hidden");
      $("companyPage").classList.add("hidden");
      $("mainPage").classList.add("hidden");
    }

    function showLoginPage() {
      hideAllPages();
      $("loginPage").classList.remove("hidden");
      $("loginError").classList.add("hidden");
      $("loginForm").reset();
    }

    function logout() {
      token = null;
      session = null;
      sessionStorage.removeItem(TOKEN_KEY);
      sessionStorage.removeItem(SESSION_KEY);
      showLoginPage();
    }

    function showCompanyPage(companies) {
      hideAllPages();
      $("companyPage").classList.remove("hidden");
      $("createCompanyForm").classList.add("hidden");
      const list = $("companyList");
      list.innerHTML = "";

      companies.forEach((company) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "company-option";
        btn.innerHTML = "<div><strong>" + company.name + "</strong><span>公司编号：" + company.id + "</span></div><span>进入 →</span>";
        btn.addEventListener("click", () => enterCompany(company.id));
        list.appendChild(btn);
      });
    }

    async function enterCompany(companyId) {
      const data = await api("/api/companies/" + companyId);
      currentCompany = data.company;
      session = {
        loginId: session.loginId || pendingAccount.loginId,
        name: session.name || pendingAccount.name,
        companyId: companyId,
        employeeId: data.employeeId,
        companies: session.companies || pendingAccount.companies
      };
      saveSession(session);
      currentBank = currentCompany.banks[0] || null;
      await showMainPage();
    }

    async function loadCompany(companyId) {
      const data = await api("/api/companies/" + companyId);
      currentCompany = data.company;
      session.employeeId = data.employeeId;
      saveSession(session);
      if (!currentCompany.banks.includes(currentBank)) {
        currentBank = currentCompany.banks[0] || null;
      }
    }

    async function showMainPage() {
      hideAllPages();
      $("mainPage").classList.remove("hidden");
      $("userName").textContent = session.name;
      $("userLoginId").textContent = session.loginId;
      $("userEmployeeId").textContent = session.employeeId;

      renderCompanySelect();
      renderBankTabs();
      await refreshRecords();
      renderSettings();
      setNowAsDefaultTime();
      switchTab("records");

      const isAdmin = currentCompany.employees.find((e) => e.employeeId === session.employeeId && e.role === "admin");
      $("settingsButton").classList.toggle("hidden", !isAdmin);
      $("settingsTabButton").classList.toggle("hidden", !isAdmin);
    }

    function renderCompanySelect() {
      const select = $("companySelect");
      select.innerHTML = "";
      session.companies.forEach((company) => {
        const option = document.createElement("option");
        option.value = company.id;
        option.textContent = company.name;
        option.selected = company.id === session.companyId;
        select.appendChild(option);
      });
    }

    function renderBankTabs() {
      const tabs = $("bankTabs");
      tabs.innerHTML = "";
      const banks = currentCompany.banks;

      if (!banks.length) {
        $("currentBankTitle").textContent = "请先添加银行";
        return;
      }

      if (!currentBank || !banks.includes(currentBank)) currentBank = banks[0];

      banks.forEach((bank) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "bank-tab" + (bank === currentBank ? " active" : "");
        btn.textContent = bank;
        btn.addEventListener("click", async () => {
          currentBank = bank;
          renderBankTabs();
          await refreshRecords();
          setNowAsDefaultTime();
        });
        tabs.appendChild(btn);
      });

      $("currentBankTitle").textContent = currentBank + " — 单据录入";
    }

    async function refreshRecords() {
      const tbody = $("recordList");
      tbody.innerHTML = "";

      if (!currentBank) {
        tbody.innerHTML = '<tr><td class="empty" colspan="5">请先在系统设置中添加银行。</td></tr>';
        updateSummary([]);
        return;
      }

      const data = await api("/api/companies/" + session.companyId + "/records?bank=" + encodeURIComponent(currentBank));
      currentRecords = data.records;

      if (!currentRecords.length) {
        tbody.innerHTML = '<tr><td class="empty" colspan="5">暂无单据，请先添加一条记录。</td></tr>';
        updateSummary([]);
        return;
      }

      currentRecords.forEach((record) => {
        const row = document.createElement("tr");
        [formatDateTime(record.time), record.ref, formatMoney(record.inAmount), formatMoney(record.outAmount)].forEach((val, i) => {
          const cell = document.createElement("td");
          cell.textContent = val;
          if (i === 2) cell.className = "income";
          if (i === 3) cell.className = "expense";
          row.appendChild(cell);
        });
        const action = document.createElement("td");
        const del = document.createElement("button");
        del.type = "button";
        del.className = "danger-button delete-record";
        del.textContent = "删除";
        del.dataset.id = record.id;
        action.appendChild(del);
        row.appendChild(action);
        tbody.appendChild(row);
      });

      updateSummary(currentRecords);
    }

    function updateSummary(records) {
      const inSum = records.reduce((s, r) => s + r.inAmount, 0);
      const outSum = records.reduce((s, r) => s + r.outAmount, 0);
      $("totalIn").textContent = formatMoney(inSum);
      $("totalOut").textContent = formatMoney(outSum);
      $("balance").textContent = formatMoney(inSum - outSum);
    }

    function renderSettings() {
      const isAdmin = currentCompany.employees.find((e) => e.employeeId === session.employeeId && e.role === "admin");
      if (!isAdmin) return;

      const empList = $("employeeList");
      const bList = $("bankList");
      empList.innerHTML = "";
      bList.innerHTML = "";

      currentCompany.employees.forEach((employee) => {
        const tag = document.createElement("span");
        tag.className = "tag";
        tag.textContent = employee.employeeId + " " + employee.name + " (" + (employee.role === "admin" ? "管理员" : "员工") + ")";
        if (employee.employeeId !== session.employeeId) {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.textContent = "×";
          btn.addEventListener("click", async () => {
            if (!confirm("确定删除员工 " + employee.name + " 吗？")) return;
            const data = await api("/api/companies/" + session.companyId + "/employees/" + employee.employeeId, { method: "DELETE" });
            currentCompany = data.company;
            renderSettings();
          });
          tag.appendChild(btn);
        }
        empList.appendChild(tag);
      });

      currentCompany.banks.forEach((bank) => {
        const tag = document.createElement("span");
        tag.className = "tag";
        tag.textContent = bank;
        if (currentCompany.banks.length > 1) {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.textContent = "×";
          btn.addEventListener("click", async () => {
            if (!confirm("确定删除银行「" + bank + "」吗？")) return;
            const data = await api("/api/companies/" + session.companyId + "/banks/" + encodeURIComponent(bank), { method: "DELETE" });
            currentCompany = data.company;
            if (currentBank === bank) currentBank = currentCompany.banks[0];
            renderBankTabs();
            await refreshRecords();
            renderSettings();
          });
          tag.appendChild(btn);
        }
        bList.appendChild(tag);
      });
    }

    function switchTab(name) {
      document.querySelectorAll(".tab-button").forEach((btn) => btn.classList.toggle("active", btn.dataset.tab === name));
      $("recordsTab").classList.toggle("hidden", name !== "records");
      $("settingsTab").classList.toggle("hidden", name !== "settings");
      if (name === "settings") renderSettings();
    }

    function downloadCsv(filename, rows) {
      const content = "\uFEFF" + rows.map((row) => row.map((cell) => '"' + String(cell == null ? "" : cell).replace(/"/g, '""') + '"').join(",")).join("\n");
      const link = document.createElement("a");
      link.href = URL.createObjectURL(new Blob([content], { type: "text/csv;charset=utf-8;" }));
      link.download = filename;
      link.click();
      URL.revokeObjectURL(link.href);
    }

    async function createCompany(name) {
      const data = await api("/api/companies", {
        method: "POST",
        body: JSON.stringify({ name })
      });

      const companies = data.companies;
      if (session) {
        session.companies = companies;
        saveSession(session);
      } else if (pendingAccount) {
        pendingAccount.companies = companies;
        session = { ...pendingAccount };
      }

      await enterCompany(data.company.id);
      alert("公司「" + name + "」创建成功！");
    }

    $("loginForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      try {
        const data = await api("/api/login", {
          method: "POST",
          body: JSON.stringify({
            loginId: $("loginId").value.trim().toLowerCase(),
            password: $("password").value
          })
        });

        saveToken(data.token);
        pendingAccount = data.account;
        session = {
          loginId: data.account.loginId,
          name: data.account.name,
          companies: data.account.companies
        };

        if (data.account.companies.length === 1) {
          await enterCompany(data.account.companies[0].id);
        } else {
          showCompanyPage(data.account.companies);
        }
      } catch (error) {
        $("loginError").textContent = error.message;
        $("loginError").classList.remove("hidden");
      }
    });

    $("backToLoginButton").addEventListener("click", logout);
    $("logoutButton").addEventListener("click", logout);
    $("settingsButton").addEventListener("click", () => switchTab("settings"));

    document.querySelectorAll(".tab-button").forEach((btn) => {
      btn.addEventListener("click", () => {
        if (btn.dataset.tab === "settings") {
          const isAdmin = currentCompany.employees.find((e) => e.employeeId === session.employeeId && e.role === "admin");
          if (!isAdmin) { alert("只有管理员可以进入系统设置。"); return; }
        }
        switchTab(btn.dataset.tab);
      });
    });

    $("companySelect").addEventListener("change", async () => {
      const companyId = $("companySelect").value;
      if (companyId === session.companyId) return;
      session.companyId = companyId;
      await loadCompany(companyId);
      renderCompanySelect();
      renderBankTabs();
      await refreshRecords();
      renderSettings();
      const isAdmin = currentCompany.employees.find((e) => e.employeeId === session.employeeId && e.role === "admin");
      $("settingsButton").classList.toggle("hidden", !isAdmin);
      $("settingsTabButton").classList.toggle("hidden", !isAdmin);
    });

    $("recordForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      if (!currentBank) { alert("请先添加银行。"); return; }

      const inAmount = Number($("inAmount").value || 0);
      const outAmount = Number($("outAmount").value || 0);
      if (inAmount === 0 && outAmount === 0) { alert("In 和 Out 至少填写一项。"); return; }

      await api("/api/companies/" + session.companyId + "/records", {
        method: "POST",
        body: JSON.stringify({
          bank: currentBank,
          time: $("time").value,
          ref: $("ref").value.trim(),
          inAmount,
          outAmount
        })
      });

      $("ref").value = "";
      $("inAmount").value = "";
      $("outAmount").value = "";
      setNowAsDefaultTime();
      await refreshRecords();
    });

    $("recordList").addEventListener("click", async (event) => {
      if (!event.target.classList.contains("delete-record")) return;
      await api("/api/companies/" + session.companyId + "/records/" + event.target.dataset.id, { method: "DELETE" });
      await refreshRecords();
    });

    $("clearBankButton").addEventListener("click", async () => {
      if (!currentBank || !confirm("确定要删除「" + currentBank + "」的全部单据记录吗？")) return;
      await api("/api/companies/" + session.companyId + "/records/bank/" + encodeURIComponent(currentBank), { method: "DELETE" });
      await refreshRecords();
    });

    $("exportBankButton").addEventListener("click", () => {
      const rows = [["公司", "银行", "员工号", "员工姓名", "时间", "Ref", "In", "Out"]];
      currentRecords.forEach((r) => rows.push([currentCompany.name, currentBank, session.employeeId, session.name, formatDateTime(r.time), r.ref, r.inAmount, r.outAmount]));
      if (!currentRecords.length) rows.push([currentCompany.name, currentBank, session.employeeId, session.name, "", "", 0, 0]);
      downloadCsv(currentCompany.name + "_" + currentBank + "_账目.csv", rows);
    });

    $("exportAllButton").addEventListener("click", async () => {
      const data = await api("/api/companies/" + session.companyId + "/records/all");
      const rows = [["公司", "银行", "员工号", "员工姓名", "时间", "Ref", "In", "Out"]];
      data.records.forEach((r) => rows.push([currentCompany.name, r.bank, session.employeeId, session.name, formatDateTime(r.time), r.ref, r.inAmount, r.outAmount]));
      if (!data.records.length) rows.push([currentCompany.name, "", session.employeeId, session.name, "", "", 0, 0]);
      downloadCsv(currentCompany.name + "_全部账目.csv", rows);
    });

    $("addEmployeeForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const data = await api("/api/companies/" + session.companyId + "/employees", {
        method: "POST",
        body: JSON.stringify({
          employeeId: $("newEmployeeId").value.trim().toUpperCase(),
          name: $("newEmployeeName").value.trim(),
          role: $("newEmployeeRole").value
        })
      });
      currentCompany = data.company;
      $("addEmployeeForm").reset();
      renderSettings();
      alert("员工添加成功。请在下方为其创建登入账号。");
    });

    $("addBankForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const data = await api("/api/companies/" + session.companyId + "/banks", {
        method: "POST",
        body: JSON.stringify({ bankName: $("newBankName").value.trim() })
      });
      currentCompany = data.company;
      if (!currentBank) currentBank = currentCompany.banks[0];
      $("addBankForm").reset();
      renderBankTabs();
      renderSettings();
    });

    $("addAccountForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const result = await api("/api/accounts", {
        method: "POST",
        body: JSON.stringify({
          companyId: session.companyId,
          loginId: $("newLoginId").value.trim().toLowerCase(),
          password: $("newLoginPassword").value,
          employeeId: $("newLoginEmployeeId").value.trim().toUpperCase()
        })
      });
      $("addAccountForm").reset();
      alert("登入账号创建成功。账号：" + result.loginId);
    });

    async function handleCreateCompany(name) {
      if (!name.trim()) { alert("请输入公司名称。"); return; }
      await createCompany(name.trim());
    }

    $("createCompanyOpenButton").addEventListener("click", () => {
      $("createCompanyForm").classList.remove("hidden");
    });
    $("createCompanyCancelButton").addEventListener("click", () => {
      $("createCompanyForm").classList.add("hidden");
    });
    $("createCompanyForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      await handleCreateCompany($("newCompanyName").value);
    });
    $("createCompanyMainButton").addEventListener("click", async () => {
      const name = prompt("请输入新公司名称：");
      if (name) await handleCreateCompany(name);
    });
    $("createCompanySettingsForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      await handleCreateCompany($("settingsCompanyName").value);
      $("settingsCompanyName").value = "";
    });

    async function init() {
      const saved = loadSession();
      if (token && saved && saved.companyId) {
        try {
          const me = await api("/api/me");
          session = { ...saved, companies: me.companies, name: me.name, loginId: me.loginId };
          await loadCompany(saved.companyId);
          await showMainPage();
          return;
        } catch (error) {
          logout();
        }
      }
      showLoginPage();
    }

    init();
  </script>
</body>
</html>
