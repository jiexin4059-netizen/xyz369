<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bank Input</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, "Microsoft YaHei", sans-serif;
      color: #1e293b;
      background: #eef2f7;
    }
    .hidden { display: none !important; }

    /* Login */
    .login-wrap {
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
      background: linear-gradient(135deg, #1e3a5f, #334155);
    }
    .login-card {
      width: min(420px, 100%); background: #fff; border-radius: 12px; padding: 32px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
    }
    .login-card h1 { margin: 0 0 8px; font-size: 28px; }
    .login-card p { margin: 0 0 24px; color: #64748b; }
    .error { background: #fef2f2; color: #b91c1c; padding: 10px 12px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }

    /* App shell */
    .app { min-height: 100vh; display: flex; flex-direction: column; }
    .topbar {
      display: flex; align-items: center; gap: 16px; padding: 0 16px; height: 56px;
      background: #1e293b; color: #fff; flex-wrap: wrap;
    }
    .menu-btn {
      width: 36px; height: 36px; border: 0; border-radius: 8px; background: #334155;
      color: #fff; font-size: 18px; cursor: pointer;
    }
    .topbar-title { font-size: 20px; font-weight: 700; min-width: 120px; }
    .topbar-field { display: flex; align-items: center; gap: 8px; font-size: 13px; }
    .topbar-field label { color: #94a3b8; white-space: nowrap; }
    .topbar select, .topbar input[type="date"] {
      height: 34px; border: 1px solid #475569; border-radius: 6px; background: #0f172a;
      color: #fff; padding: 0 10px; font-size: 13px;
    }
    .topbar-spacer { flex: 1; }
    .topbar-user { font-size: 13px; color: #cbd5e1; }
    .topbar button.ghost {
      height: 34px; border: 1px solid #475569; border-radius: 6px; background: transparent;
      color: #e2e8f0; padding: 0 12px; cursor: pointer; font-size: 13px;
    }

    /* Bank tabs */
    .bank-tabs-wrap {
      background: #fff; border-bottom: 1px solid #dbe3ee; overflow-x: auto;
    }
    .bank-tabs {
      display: flex; gap: 0; min-width: max-content; padding: 0 8px;
    }
    .bank-tab {
      padding: 12px 18px; border: 0; border-bottom: 3px solid transparent;
      background: transparent; color: #475569; font-size: 13px; font-weight: 600;
      cursor: pointer; white-space: nowrap;
    }
    .bank-tab.active {
      color: #2563eb; border-bottom-color: #2563eb; background: #f8fbff;
    }
    .bank-tab .check { color: #16a34a; margin-left: 4px; }

    /* Account bar */
    .account-bar {
      display: flex; align-items: center; gap: 24px; flex-wrap: wrap;
      padding: 12px 16px; background: #fff; border-bottom: 1px solid #dbe3ee;
    }
    .account-item { font-size: 13px; color: #64748b; }
    .account-item strong { color: #0f172a; margin-left: 6px; }
    .account-spacer { flex: 1; }
    .search-box {
      display: flex; gap: 8px; align-items: center;
    }
    .search-box input {
      width: 200px; height: 34px; border: 1px solid #cbd5e1; border-radius: 6px; padding: 0 10px;
    }
    .btn {
      height: 34px; border: 0; border-radius: 6px; padding: 0 14px; font-size: 13px;
      font-weight: 600; cursor: pointer;
    }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-secondary { background: #e2e8f0; color: #334155; }
    .btn-success { background: #16a34a; color: #fff; }
    .btn-danger { background: #dc2626; color: #fff; }
    .btn-insert {
      width: 100%; height: 44px; font-size: 15px; margin-top: 8px;
      background: #2563eb; color: #fff; border: 0; border-radius: 8px; cursor: pointer; font-weight: 700;
    }

    /* Main layout */
    .main-layout { display: flex; flex: 1; min-height: 0; }
    .table-panel {
      flex: 1; min-width: 0; background: #fff; margin: 12px 0 12px 12px;
      border: 1px solid #dbe3ee; border-radius: 8px; display: flex; flex-direction: column;
    }
    .table-scroll { overflow: auto; flex: 1; }
    table.data-table {
      width: 100%; border-collapse: collapse; font-size: 12px; min-width: 1400px;
    }
    .data-table th {
      position: sticky; top: 0; background: #f8fafc; color: #475569;
      padding: 10px 8px; border-bottom: 1px solid #dbe3ee; text-align: left; white-space: nowrap;
    }
    .data-table td {
      padding: 8px; border-bottom: 1px solid #f1f5f9; white-space: nowrap;
    }
    .data-table tr:hover td { background: #f8fbff; }
    .data-table .in { color: #16a34a; }
    .data-table .out { color: #dc2626; }
    .empty-row { text-align: center; color: #94a3b8; padding: 40px !important; }

    /* Sidebar form */
    .sidebar {
      width: 320px; flex-shrink: 0; background: #fff; margin: 12px 12px 12px 0;
      border: 1px solid #dbe3ee; border-radius: 8px; padding: 16px; overflow-y: auto;
    }
    .sidebar h2 {
      margin: 0 0 16px; font-size: 16px; padding-bottom: 10px; border-bottom: 1px solid #e2e8f0;
    }
    .field { margin-bottom: 12px; }
    .field label {
      display: block; font-size: 12px; font-weight: 600; color: #475569; margin-bottom: 4px;
    }
    .field input, .field select, .field textarea {
      width: 100%; border: 1px solid #cbd5e1; border-radius: 6px; padding: 8px 10px; font-size: 13px;
    }
    .field textarea { min-height: 70px; resize: vertical; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .radio-row { display: flex; gap: 16px; margin-bottom: 12px; }
    .radio-row label { font-size: 13px; display: flex; align-items: center; gap: 6px; cursor: pointer; }

    /* Drawer */
    .drawer-overlay {
      position: fixed; inset: 0; background: rgba(15,23,42,0.45); z-index: 100;
    }
    .drawer {
      position: fixed; top: 0; left: 0; width: min(360px, 90vw); height: 100%;
      background: #fff; z-index: 101; padding: 20px; overflow-y: auto;
      box-shadow: 4px 0 24px rgba(0,0,0,0.15);
    }
    .drawer h3 { margin: 20px 0 10px; font-size: 14px; color: #0f172a; }
    .drawer-section { margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid #e2e8f0; }
    .tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .tag {
      padding: 4px 8px; background: #e2e8f0; border-radius: 999px; font-size: 12px;
    }

    .company-page {
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .company-card {
      width: min(500px, 100%); background: #fff; border-radius: 12px; padding: 28px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.1);
    }
    .company-option {
      display: flex; justify-content: space-between; width: 100%; padding: 14px 16px;
      margin-top: 10px; border: 1px solid #e2e8f0; border-radius: 8px; background: #fff; cursor: pointer;
    }
    .company-option:hover { border-color: #2563eb; }

    @media (max-width: 960px) {
      .main-layout { flex-direction: column; }
      .sidebar { width: auto; margin: 0 12px 12px; }
      .table-panel { margin: 12px; }
    }
  </style>
</head>
<body>
  <!-- Login -->
  <div id="loginPage" class="login-wrap">
    <div class="login-card">
      <h1>Bank Input</h1>
      <p>公司账目管理系统 · 云端多人版</p>
      <div id="loginError" class="error hidden"></div>
      <form id="loginForm">
        <div class="field"><label>登入账号</label><input id="loginId" placeholder="admin" required></div>
        <div class="field"><label>密码</label><input id="password" type="password" placeholder="123456" required></div>
        <button class="btn-insert" type="submit">登入</button>
      </form>
      <p style="margin-top:16px;font-size:13px;color:#64748b;">演示：admin / 123456</p>
    </div>
  </div>

  <!-- Company select -->
  <div id="companyPage" class="company-page hidden">
    <div class="company-card">
      <h2>选择公司</h2>
      <p style="color:#64748b;">请选择要进入的公司</p>
      <div id="companyList"></div>
      <div style="margin-top:16px;display:flex;gap:10px;flex-wrap:wrap;">
        <button class="btn btn-primary" id="createCompanyOpenButton" type="button">+ 创建新公司</button>
        <button class="btn btn-secondary" id="backToLoginButton" type="button">返回登入</button>
      </div>
      <form id="createCompanyForm" class="hidden" style="margin-top:16px;">
        <div class="field"><label>新公司名称</label><input id="newCompanyName" required></div>
        <button class="btn btn-primary" type="submit">确认创建</button>
      </form>
    </div>
  </div>

  <!-- Main app -->
  <div id="mainPage" class="app hidden">
    <header class="topbar">
      <button class="menu-btn" id="menuButton" type="button" aria-label="菜单">☰</button>
      <div class="topbar-title">Bank Input</div>
      <div class="topbar-field">
        <label>Company</label>
        <select id="companySelect"></select>
      </div>
      <div class="topbar-field">
        <label>Transaction Date</label>
        <input type="date" id="transactionDate">
      </div>
      <div class="topbar-spacer"></div>
      <div class="topbar-user" id="userInfo"></div>
      <button class="ghost" id="exportAllButton" type="button">导出 Excel</button>
      <button class="ghost" id="logoutButton" type="button">退出</button>
    </header>

    <div class="bank-tabs-wrap">
      <div class="bank-tabs" id="bankTabs"></div>
    </div>

    <div class="account-bar">
      <div class="account-item">Bank Account No<strong id="bankAccountNo">-</strong></div>
      <div class="account-item">Bank Account Name<strong id="bankAccountName">-</strong></div>
      <div class="account-item">Bank Account Balance<strong id="bankBalance">0.00</strong></div>
      <div class="account-spacer"></div>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search...">
        <button class="btn btn-secondary" id="filterButton" type="button">Filter</button>
      </div>
    </div>

    <div class="main-layout">
      <section class="table-panel">
        <div class="table-scroll">
          <table class="data-table">
            <thead>
              <tr>
                <th>Time</th>
                <th>Reference</th>
                <th>In</th>
                <th>Out</th>
                <th>Type</th>
                <th>BC</th>
                <th>Category</th>
                <th>Kiosk</th>
                <th>SID</th>
                <th>PID</th>
                <th>Credit</th>
                <th>Rate</th>
                <th>Bonus</th>
                <th>Tips</th>
                <th>Remark</th>
                <th>Employee</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="recordList"></tbody>
          </table>
        </div>
      </section>

      <aside class="sidebar">
        <h2>New Transaction</h2>
        <form id="recordForm">
          <div class="radio-row">
            <label><input type="radio" name="txType" value="In" checked> In</label>
            <label><input type="radio" name="txType" value="Out"> Out</label>
          </div>
          <div class="field"><label>Time</label><input type="datetime-local" id="time" required></div>
          <div class="field"><label>Reference</label><input id="ref" placeholder="Bank reference no" required></div>
          <div class="field"><label id="amountLabel">In</label><input type="number" id="amount" min="0" step="0.01" placeholder="0.00"></div>
          <div class="field">
            <label>Category</label>
            <select id="category">
              <option value="GAME">GAME</option>
              <option value="TRANSFER">TRANSFER</option>
              <option value="EXPENSE">EXPENSE</option>
              <option value="OTHER">OTHER</option>
            </select>
          </div>
          <div class="field">
            <label>Server</label>
            <select id="kiosk">
              <option value="UNCLAIMED">UNCLAIMED</option>
              <option value="SERVER-A">SERVER-A</option>
              <option value="SERVER-B">SERVER-B</option>
            </select>
          </div>
          <div class="field-row">
            <div class="field"><label>SID</label><input id="sid"></div>
            <div class="field"><label>PID</label><input id="pid"></div>
          </div>
          <div class="field-row">
            <div class="field"><label>Credit amount</label><input type="number" id="credit" min="0" step="0.01"></div>
            <div class="field"><label>Rate</label><input type="number" id="rate" min="0" step="0.01"></div>
          </div>
          <div class="field-row">
            <div class="field"><label>Bonus</label><input type="number" id="bonus" min="0" step="0.01"></div>
            <div class="field"><label>%</label><input type="number" id="bonusPercent" min="0" step="0.01"></div>
          </div>
          <div class="field"><label>Total</label><input id="total" readonly></div>
          <div class="field"><label>Remarks</label><textarea id="remark" placeholder="Extra remarks notes"></textarea></div>
          <div class="field"><label>BC</label><input id="bc"></div>
          <div class="field"><label>Tips</label><input type="number" id="tips" min="0" step="0.01"></div>
          <button class="btn-insert" type="submit">Insert</button>
        </form>
      </aside>
    </div>
  </div>

  <!-- Settings drawer -->
  <div id="drawerOverlay" class="drawer-overlay hidden"></div>
  <aside id="drawer" class="drawer hidden">
    <h2>系统设置</h2>
    <button class="btn btn-secondary" id="closeDrawerButton" type="button">关闭</button>

    <div class="drawer-section">
      <h3>创建新公司</h3>
      <form id="createCompanySettingsForm">
        <div class="field"><input id="settingsCompanyName" placeholder="公司名称" required></div>
        <button class="btn btn-primary" type="submit">创建</button>
      </form>
    </div>

    <div class="drawer-section" id="adminSection">
      <h3>添加银行</h3>
      <form id="addBankForm">
        <div class="field"><input id="newBankName" placeholder="银行名称" required></div>
        <div class="field"><input id="newBankAccountNo" placeholder="账号（可选）"></div>
        <button class="btn btn-primary" type="submit">添加银行</button>
      </form>
      <div class="tag-list" id="bankList"></div>

      <h3>添加员工</h3>
      <form id="addEmployeeForm">
        <div class="field"><input id="newEmployeeId" placeholder="员工号 EMP004" required></div>
        <div class="field"><input id="newEmployeeName" placeholder="姓名" required></div>
        <div class="field">
          <select id="newEmployeeRole">
            <option value="user">普通员工</option>
            <option value="admin">管理员</option>
          </select>
        </div>
        <button class="btn btn-primary" type="submit">添加员工</button>
      </form>
      <div class="tag-list" id="employeeList"></div>

      <h3>创建登入账号</h3>
      <form id="addAccountForm">
        <div class="field"><input id="newLoginId" placeholder="登入账号" required></div>
        <div class="field"><input id="newLoginPassword" type="password" placeholder="密码" required></div>
        <div class="field"><input id="newLoginEmployeeId" placeholder="对应员工号" required></div>
        <button class="btn btn-primary" type="submit">创建账号</button>
      </form>
    </div>
  </aside>

  <script>
    const TOKEN_KEY = "companyAccountToken";
    const SESSION_KEY = "companyAccountSession";

    let token = sessionStorage.getItem(TOKEN_KEY);
    let session = null;
    let currentCompany = null;
    let currentRecords = [];
    let filteredRecords = [];
    let currentBank = null;
    let pendingAccount = null;

    const $ = (id) => document.getElementById(id);

    async function api(path, options = {}) {
      const headers = { "Content-Type": "application/json", ...(options.headers || {}) };
      if (token) headers.Authorization = "Bearer " + token;
      const response = await fetch(path, { ...options, headers });
      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        if (response.status === 401) logout();
        throw new Error(data.error || "请求失败");
      }
      return data;
    }

    function saveToken(v) { token = v; sessionStorage.setItem(TOKEN_KEY, v); }
    function saveSession(v) { session = v; sessionStorage.setItem(SESSION_KEY, JSON.stringify(v)); }
    function loadSession() { try { return JSON.parse(sessionStorage.getItem(SESSION_KEY)); } catch { return null; } }

    function formatMoney(n) { return Number(n || 0).toFixed(2); }
    function formatDateTime(v) {
      const d = new Date(v);
      if (Number.isNaN(d.getTime())) return v || "";
      const p = (n) => String(n).padStart(2, "0");
      return d.getFullYear() + "-" + p(d.getMonth()+1) + "-" + p(d.getDate()) + " " + p(d.getHours()) + ":" + p(d.getMinutes());
    }

    function setToday() {
      const now = new Date();
      $("transactionDate").value = now.toISOString().slice(0, 10);
      now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
      $("time").value = now.toISOString().slice(0, 16);
    }

    function getTxType() {
      return document.querySelector('input[name="txType"]:checked').value;
    }

    function updateAmountLabel() {
      const type = getTxType();
      $("amountLabel").textContent = type;
    }

    function updateTotal() {
      const amount = Number($("amount").value || 0);
      const credit = Number($("credit").value || 0);
      const rate = Number($("rate").value || 0);
      const bonus = Number($("bonus").value || 0);
      const creditTotal = credit * rate;
      $("total").value = formatMoney(amount || creditTotal + bonus);
    }

    function isAdmin() {
      return currentCompany.employees.some((e) => e.employeeId === session.employeeId && e.role === "admin");
    }

    function hideAll() {
      $("loginPage").classList.add("hidden");
      $("companyPage").classList.add("hidden");
      $("mainPage").classList.add("hidden");
    }

    function showLogin() {
      hideAll();
      $("loginPage").classList.remove("hidden");
      $("loginError").classList.add("hidden");
      token = null;
      session = null;
      sessionStorage.clear();
    }

    function showCompanyPage(companies) {
      hideAll();
      $("companyPage").classList.remove("hidden");
      $("createCompanyForm").classList.add("hidden");
      const list = $("companyList");
      list.innerHTML = "";
      companies.forEach((c) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "company-option";
        btn.innerHTML = "<div><strong>" + c.name + "</strong><br><small>" + c.id + "</small></div><span>→</span>";
        btn.addEventListener("click", () => enterCompany(c.id));
        list.appendChild(btn);
      });
    }

    async function enterCompany(companyId) {
      const data = await api("/api/companies/" + companyId);
      currentCompany = data.company;
      session = {
        loginId: session?.loginId || pendingAccount.loginId,
        name: session?.name || pendingAccount.name,
        companyId,
        employeeId: data.employeeId,
        companies: session?.companies || pendingAccount.companies
      };
      saveSession(session);
      currentBank = currentCompany.banks[0]?.name || null;
      await showMain();
    }

    async function loadCompany(companyId) {
      const data = await api("/api/companies/" + companyId);
      currentCompany = data.company;
      session.employeeId = data.employeeId;
      saveSession(session);
      if (!currentCompany.banks.some((b) => b.name === currentBank)) {
        currentBank = currentCompany.banks[0]?.name || null;
      }
    }

    async function showMain() {
      hideAll();
      $("mainPage").classList.remove("hidden");
      $("userInfo").textContent = session.name + " (" + session.employeeId + ")";
      renderCompanySelect();
      renderBankTabs();
      updateBankInfo();
      await refreshRecords();
      renderDrawerSettings();
      setToday();
      $("adminSection").classList.toggle("hidden", !isAdmin());
    }

    function renderCompanySelect() {
      const sel = $("companySelect");
      sel.innerHTML = "";
      session.companies.forEach((c) => {
        const opt = document.createElement("option");
        opt.value = c.id;
        opt.textContent = c.name;
        opt.selected = c.id === session.companyId;
        sel.appendChild(opt);
      });
    }

    function renderBankTabs() {
      const tabs = $("bankTabs");
      tabs.innerHTML = "";
      currentCompany.banks.forEach((bank) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "bank-tab" + (bank.name === currentBank ? " active" : "");
        btn.innerHTML = bank.name + (bank.name === currentBank ? '<span class="check">✓</span>' : "");
        btn.addEventListener("click", async () => {
          currentBank = bank.name;
          renderBankTabs();
          updateBankInfo();
          await refreshRecords();
        });
        tabs.appendChild(btn);
      });
    }

    function updateBankInfo() {
      const bank = currentCompany.banks.find((b) => b.name === currentBank);
      $("bankAccountNo").textContent = bank?.accountNo || "-";
      $("bankAccountName").textContent = bank?.name || "-";
    }

    function applyFilter() {
      const q = $("searchInput").value.trim().toLowerCase();
      filteredRecords = q
        ? currentRecords.filter((r) =>
            [r.ref, r.category, r.kiosk, r.sid, r.pid, r.remark, r.employeeName, r.employeeId]
              .some((v) => String(v || "").toLowerCase().includes(q))
          )
        : currentRecords.slice();
      renderTable();
    }

    function renderTable() {
      const tbody = $("recordList");
      tbody.innerHTML = "";

      if (!filteredRecords.length) {
        tbody.innerHTML = '<tr><td class="empty-row" colspan="17">No Rows To Show</td></tr>';
        return;
      }

      filteredRecords.forEach((r) => {
        const row = document.createElement("tr");
        const cells = [
          formatDateTime(r.time), r.ref,
          r.inAmount ? formatMoney(r.inAmount) : "",
          r.outAmount ? formatMoney(r.outAmount) : "",
          r.type, r.bc, r.category, r.kiosk, r.sid, r.pid,
          r.credit ? formatMoney(r.credit) : "",
          r.rate ? formatMoney(r.rate) : "",
          r.bonus ? formatMoney(r.bonus) : "",
          r.tips ? formatMoney(r.tips) : "",
          r.remark,
          r.employeeName || r.employeeId
        ];
        cells.forEach((val, i) => {
          const td = document.createElement("td");
          td.textContent = val;
          if (i === 2) td.className = "in";
          if (i === 3) td.className = "out";
          row.appendChild(td);
        });
        const action = document.createElement("td");
        const del = document.createElement("button");
        del.className = "btn btn-danger";
        del.style.cssText = "padding:2px 8px;font-size:11px;";
        del.textContent = "×";
        del.addEventListener("click", async () => {
          await api("/api/companies/" + session.companyId + "/records/" + r.id, { method: "DELETE" });
          await refreshRecords();
        });
        action.appendChild(del);
        row.appendChild(action);
        tbody.appendChild(row);
      });
    }

    async function refreshRecords() {
      if (!currentBank) {
        currentRecords = [];
        filteredRecords = [];
        $("bankBalance").textContent = "0.00";
        renderTable();
        return;
      }
      const data = await api("/api/companies/" + session.companyId + "/records?bank=" + encodeURIComponent(currentBank));
      currentRecords = data.records;
      $("bankBalance").textContent = formatMoney(data.balance);
      applyFilter();
    }

    function renderDrawerSettings() {
      if (!isAdmin()) return;
      const bList = $("bankList");
      const eList = $("employeeList");
      bList.innerHTML = "";
      eList.innerHTML = "";
      currentCompany.banks.forEach((b) => {
        const tag = document.createElement("span");
        tag.className = "tag";
        tag.textContent = b.name + (b.accountNo ? " (" + b.accountNo + ")" : "");
        bList.appendChild(tag);
      });
      currentCompany.employees.forEach((e) => {
        const tag = document.createElement("span");
        tag.className = "tag";
        tag.textContent = e.employeeId + " " + e.name;
        eList.appendChild(tag);
      });
    }

    function openDrawer() {
      $("drawerOverlay").classList.remove("hidden");
      $("drawer").classList.remove("hidden");
      renderDrawerSettings();
    }

    function closeDrawer() {
      $("drawerOverlay").classList.add("hidden");
      $("drawer").classList.add("hidden");
    }

    function downloadCsv(filename, rows) {
      const content = "\uFEFF" + rows.map((row) => row.map((c) => '"' + String(c ?? "").replace(/"/g, '""') + '"').join(",")).join("\n");
      const a = document.createElement("a");
      a.href = URL.createObjectURL(new Blob([content], { type: "text/csv;charset=utf-8;" }));
      a.download = filename;
      a.click();
    }

    async function createCompany(name) {
      const data = await api("/api/companies", { method: "POST", body: JSON.stringify({ name }) });
      if (session) session.companies = data.companies;
      else if (pendingAccount) { pendingAccount.companies = data.companies; session = { ...pendingAccount }; }
      saveSession(session);
      await enterCompany(data.company.id);
      alert("公司「" + name + "」创建成功");
    }

    $("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      try {
        const data = await api("/api/login", {
          method: "POST",
          body: JSON.stringify({ loginId: $("loginId").value.trim().toLowerCase(), password: $("password").value })
        });
        saveToken(data.token);
        pendingAccount = data.account;
        session = { loginId: data.account.loginId, name: data.account.name, companies: data.account.companies };
        if (data.account.companies.length === 1) await enterCompany(data.account.companies[0].id);
        else showCompanyPage(data.account.companies);
      } catch (err) {
        $("loginError").textContent = err.message;
        $("loginError").classList.remove("hidden");
      }
    });

    $("companySelect").addEventListener("change", async () => {
      session.companyId = $("companySelect").value;
      await loadCompany(session.companyId);
      renderCompanySelect();
      renderBankTabs();
      updateBankInfo();
      await refreshRecords();
      $("adminSection").classList.toggle("hidden", !isAdmin());
    });

    document.querySelectorAll('input[name="txType"]').forEach((el) => {
      el.addEventListener("change", updateAmountLabel);
    });
    ["amount", "credit", "rate", "bonus"].forEach((id) => {
      $(id).addEventListener("input", updateTotal);
    });

    $("recordForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      if (!currentBank) return alert("请先选择银行");
      const type = getTxType();
      const amount = Number($("amount").value || 0);
      await api("/api/companies/" + session.companyId + "/records", {
        method: "POST",
        body: JSON.stringify({
          bank: currentBank,
          type,
          time: $("time").value,
          ref: $("ref").value.trim(),
          inAmount: type === "In" ? amount : 0,
          outAmount: type === "Out" ? amount : 0,
          amount,
          category: $("category").value,
          kiosk: $("kiosk").value,
          sid: $("sid").value.trim(),
          pid: $("pid").value.trim(),
          credit: Number($("credit").value || 0),
          rate: Number($("rate").value || 0),
          bonus: Number($("bonus").value || 0),
          bonusPercent: Number($("bonusPercent").value || 0),
          tips: Number($("tips").value || 0),
          remark: $("remark").value.trim(),
          bc: $("bc").value.trim(),
          transactionDate: $("transactionDate").value
        })
      });
      $("ref").value = "";
      $("amount").value = "";
      $("sid").value = "";
      $("pid").value = "";
      $("credit").value = "";
      $("rate").value = "";
      $("bonus").value = "";
      $("bonusPercent").value = "";
      $("tips").value = "";
      $("remark").value = "";
      $("bc").value = "";
      $("total").value = "";
      setToday();
      await refreshRecords();
    });

    $("searchInput").addEventListener("input", applyFilter);
    $("filterButton").addEventListener("click", applyFilter);
    $("menuButton").addEventListener("click", openDrawer);
    $("closeDrawerButton").addEventListener("click", closeDrawer);
    $("drawerOverlay").addEventListener("click", closeDrawer);
    $("logoutButton").addEventListener("click", showLogin);
    $("backToLoginButton").addEventListener("click", showLogin);

    $("createCompanyOpenButton").addEventListener("click", () => $("createCompanyForm").classList.remove("hidden"));
    $("createCompanyForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      await createCompany($("newCompanyName").value);
    });
    $("createCompanySettingsForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      await createCompany($("settingsCompanyName").value);
      $("settingsCompanyName").value = "";
      closeDrawer();
    });

    $("addBankForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const data = await api("/api/companies/" + session.companyId + "/banks", {
        method: "POST",
        body: JSON.stringify({ bankName: $("newBankName").value.trim(), accountNo: $("newBankAccountNo").value.trim() })
      });
      currentCompany = data.company;
      $("addBankForm").reset();
      renderBankTabs();
      renderDrawerSettings();
    });

    $("addEmployeeForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const data = await api("/api/companies/" + session.companyId + "/employees", {
        method: "POST",
        body: JSON.stringify({
          employeeId: $("newEmployeeId").value.trim().toUpperCase(),
          name: $("newEmployeeName").value.trim(),
          role: $("newEmployeeRole").value
        })
      });
      currentCompany = data.company;
      $("addEmployeeForm").reset();
      renderDrawerSettings();
    });

    $("addAccountForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      await api("/api/accounts", {
        method: "POST",
        body: JSON.stringify({
          companyId: session.companyId,
          loginId: $("newLoginId").value.trim().toLowerCase(),
          password: $("newLoginPassword").value,
          employeeId: $("newLoginEmployeeId").value.trim().toUpperCase()
        })
      });
      $("addAccountForm").reset();
      alert("登入账号创建成功");
    });

    $("exportAllButton").addEventListener("click", async () => {
      const data = await api("/api/companies/" + session.companyId + "/records/all");
      const rows = [["Company", "Bank", "Time", "Reference", "In", "Out", "Type", "BC", "Category", "Kiosk", "SID", "PID", "Credit", "Rate", "Bonus", "Tips", "Remark", "Employee"]];
      data.records.forEach((r) => rows.push([
        currentCompany.name, r.bank || currentBank, formatDateTime(r.time), r.ref,
        r.inAmount, r.outAmount, r.type, r.bc, r.category, r.kiosk, r.sid, r.pid,
        r.credit, r.rate, r.bonus, r.tips, r.remark, r.employeeName || r.employeeId
      ]));
      downloadCsv(currentCompany.name + "_export.csv", rows);
    });

    async function init() {
      const saved = loadSession();
      if (token && saved?.companyId) {
        try {
          const me = await api("/api/me");
          session = { ...saved, companies: me.companies, name: me.name, loginId: me.loginId };
          await loadCompany(saved.companyId);
          currentBank = currentCompany.banks[0]?.name || null;
          await showMain();
          return;
        } catch { showLogin(); return; }
      }
      showLogin();
    }

    init();
  </script>
</body>
</html>
