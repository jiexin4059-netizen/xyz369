<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公司账目管理系统</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      color: #1f2937;
      background: linear-gradient(135deg, #eef2ff 0%, #f8fafc 55%, #e0f2fe 100%);
    }

    .page {
      width: min(1100px, calc(100% - 32px));
      margin: 0 auto;
      padding: 40px 0;
    }

    .header {
      margin-bottom: 24px;
      text-align: center;
    }

    .header h1 {
      margin: 0 0 8px;
      font-size: 32px;
      color: #0f172a;
    }

    .header p {
      margin: 0;
      color: #64748b;
    }

    .card {
      margin-bottom: 24px;
      padding: 24px;
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
    }

    .login-grid {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: end;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .employee-badge {
      padding: 10px 14px;
      border-radius: 999px;
      color: #1e3a8a;
      background: #dbeafe;
      font-weight: 700;
    }

    .bank-tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .bank-tab {
      color: #334155;
      background: #e2e8f0;
    }

    .bank-tab.active {
      color: #fff;
      background: #2563eb;
    }

    .bank-panel-heading {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .bank-panel-heading span,
    .today-note {
      color: #64748b;
      font-size: 14px;
    }

    .bank-panel-heading h2 {
      margin: 6px 0 0;
      color: #0f172a;
      font-size: 26px;
    }

    .today-note {
      padding: 10px 14px;
      border-radius: 999px;
      background: #f1f5f9;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      align-items: end;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-weight: 700;
      color: #334155;
    }

    input,
    select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      font-size: 15px;
      background: #fff;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus,
    select:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    .button-row {
      display: flex;
      gap: 12px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(15, 23, 42, 0.12);
    }

    .primary-button {
      color: #fff;
      background: #2563eb;
    }

    .secondary-button {
      color: #334155;
      background: #e2e8f0;
    }

    .danger-button {
      color: #fff;
      background: #dc2626;
    }

    .hidden {
      display: none;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .summary-item {
      padding: 18px;
      border-radius: 16px;
      background: #fff;
      border: 1px solid #e2e8f0;
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.06);
    }

    .summary-item span {
      display: block;
      margin-bottom: 8px;
      color: #64748b;
      font-size: 14px;
    }

    .summary-item strong {
      font-size: 24px;
    }

    .income {
      color: #16a34a;
    }

    .expense {
      color: #dc2626;
    }

    .balance {
      color: #2563eb;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }

    th,
    td {
      padding: 14px 12px;
      border-bottom: 1px solid #e2e8f0;
      text-align: left;
    }

    th {
      background: #f8fafc;
      color: #475569;
      font-size: 14px;
    }

    tbody tr:hover {
      background: #f8fafc;
    }

    .empty {
      padding: 28px 12px;
      text-align: center;
      color: #94a3b8;
    }

    .delete-record {
      padding: 8px 12px;
      font-size: 13px;
    }

    @media (max-width: 900px) {
      .login-grid,
      .bank-tabs,
      .form-grid,
      .summary {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 620px) {
      .page {
        width: min(100% - 20px, 1100px);
        padding: 24px 0;
      }

      .card {
        padding: 18px;
      }

      .login-grid,
      .bank-tabs,
      .form-grid,
      .summary {
        grid-template-columns: 1fr;
      }

      .header h1 {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="header">
      <h1>公司账目管理系统</h1>
          <p>员工登入后进入不同银行页面，按时间和 Ref 记录每日 In 和 Out。</p>
    </header>

    <section id="loginSection" class="card">
      <form id="loginForm">
        <div class="login-grid">
          <div class="form-field">
            <label for="employeeNumber">员工号</label>
            <input type="text" id="employeeNumber" placeholder="例如：EMP001" autocomplete="username" required>
          </div>
          <button type="submit" class="primary-button">登入账户</button>
        </div>
      </form>
    </section>

    <section id="appSection" class="hidden">
      <div class="toolbar">
        <div class="employee-badge">当前员工号：<span id="currentEmployeeNumber"></span></div>
        <button type="button" id="logoutButton" class="secondary-button">登出</button>
      </div>

      <section class="card">
        <div id="bankTabs" class="bank-tabs" aria-label="银行页面"></div>
      </section>

      <section class="card">
        <div class="bank-panel-heading">
          <div>
            <span>当前银行页面</span>
            <h2 id="activeBankName">MBB XX</h2>
          </div>
          <div class="today-note">当天日期：<strong id="todayDate"></strong></div>
        </div>

        <form id="accountForm">
          <div class="form-grid">
            <div class="form-field">
              <label for="time">收款时间</label>
              <input type="time" id="time" required>
            </div>

            <div class="form-field">
              <label for="ref">Ref</label>
              <input type="text" id="ref" placeholder="例如：INV-001" required>
            </div>

            <div class="form-field">
              <label for="inAmount">In（收）</label>
              <input type="number" id="inAmount" min="0" step="0.01" placeholder="0.00">
            </div>

            <div class="form-field">
              <label for="outAmount">Out（出）</label>
              <input type="number" id="outAmount" min="0" step="0.01" placeholder="0.00">
            </div>
          </div>

          <div class="button-row">
            <button type="submit" class="primary-button">添加记录</button>
            <button type="reset" class="secondary-button">清空输入</button>
            <button type="button" id="clearAllButton" class="danger-button">删除本银行记录</button>
          </div>
        </form>
      </section>

    <section class="summary" aria-label="账目汇总">
      <div class="summary-item">
        <span>总 In（收）</span>
        <strong id="totalIncome" class="income">¥0.00</strong>
      </div>
      <div class="summary-item">
        <span>总 Out（出）</span>
        <strong id="totalExpense" class="expense">¥0.00</strong>
      </div>
      <div class="summary-item">
        <span>结余</span>
        <strong id="balance" class="balance">¥0.00</strong>
      </div>
    </section>

    <section class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>日期</th>
              <th>时间</th>
              <th>Ref</th>
              <th>In（收）</th>
              <th>Out（出）</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="recordList"></tbody>
        </table>
      </div>
    </section>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "companyAccountRecords";
    const SESSION_KEY = "companyAccountEmployee";
    const BANKS = ["MBB XX", "PBB XX", "CIMB XX"];

    const loginSection = document.getElementById("loginSection");
    const appSection = document.getElementById("appSection");
    const loginForm = document.getElementById("loginForm");
    const employeeNumberInput = document.getElementById("employeeNumber");
    const currentEmployeeNumber = document.getElementById("currentEmployeeNumber");
    const logoutButton = document.getElementById("logoutButton");
    const form = document.getElementById("accountForm");
    const bankTabs = document.getElementById("bankTabs");
    const activeBankName = document.getElementById("activeBankName");
    const todayDate = document.getElementById("todayDate");
    const timeInput = document.getElementById("time");
    const refInput = document.getElementById("ref");
    const inAmountInput = document.getElementById("inAmount");
    const outAmountInput = document.getElementById("outAmount");
    const recordList = document.getElementById("recordList");
    const totalIncome = document.getElementById("totalIncome");
    const totalExpense = document.getElementById("totalExpense");
    const balance = document.getElementById("balance");
    const clearAllButton = document.getElementById("clearAllButton");

    let records = loadRecords();
    let activeEmployeeNumber = sessionStorage.getItem(SESSION_KEY) || "";
    let activeBank = BANKS[0];

    function loadRecords() {
      const savedRecords = localStorage.getItem(STORAGE_KEY);
      if (!savedRecords) {
        return [];
      }

      try {
        return JSON.parse(savedRecords);
      } catch (error) {
        return [];
      }
    }

    function saveRecords() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
    }

    function formatMoney(amount) {
      return `¥${Number(amount).toFixed(2)}`;
    }

    function getTodayDate() {
      const today = new Date();
      const year = today.getFullYear();
      const month = String(today.getMonth() + 1).padStart(2, "0");
      const day = String(today.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function setTodayDisplay() {
      todayDate.textContent = getTodayDate();
    }

    function renderBankTabs() {
      bankTabs.innerHTML = "";

      BANKS.forEach(function (bank) {
        const tab = document.createElement("button");
        tab.type = "button";
        tab.className = bank === activeBank ? "bank-tab active" : "bank-tab";
        tab.dataset.bank = bank;
        tab.textContent = bank;
        bankTabs.appendChild(tab);
      });
    }

    function setActiveBank(bank) {
      activeBank = bank;
      activeBankName.textContent = bank;
      renderBankTabs();
      renderRecords();
    }

    function showLogin() {
      activeEmployeeNumber = "";
      sessionStorage.removeItem(SESSION_KEY);
      loginSection.classList.remove("hidden");
      appSection.classList.add("hidden");
      employeeNumberInput.focus();
    }

    function showApp(employeeNumber) {
      activeEmployeeNumber = employeeNumber;
      sessionStorage.setItem(SESSION_KEY, employeeNumber);
      currentEmployeeNumber.textContent = employeeNumber;
      activeBankName.textContent = activeBank;
      loginSection.classList.add("hidden");
      appSection.classList.remove("hidden");
      setTodayDisplay();
      renderBankTabs();
      renderRecords();
    }

    function getVisibleRecords() {
      return records.filter(function (record) {
        const isCurrentEmployee = record.employeeNumber === activeEmployeeNumber;
        const isActiveBank = record.bank === activeBank;
        return isCurrentEmployee && isActiveBank;
      });
    }

    function renderRecords() {
      const visibleRecords = getVisibleRecords();
      recordList.innerHTML = "";

      if (visibleRecords.length === 0) {
        recordList.innerHTML = '<tr><td class="empty" colspan="6">暂无记录，请先添加一条银行单据。</td></tr>';
        updateSummary(visibleRecords);
        return;
      }

      visibleRecords.forEach((record) => {
        const row = document.createElement("tr");
        const values = [
          record.date,
          record.time || "-",
          record.ref,
          formatMoney(record.inAmount),
          formatMoney(record.outAmount)
        ];

        values.forEach((value, cellIndex) => {
          const cell = document.createElement("td");
          cell.textContent = value;

          if (cellIndex === 3) {
            cell.className = "income";
          }

          if (cellIndex === 4) {
            cell.className = "expense";
          }

          row.appendChild(cell);
        });

        const actionCell = document.createElement("td");
        const deleteButton = document.createElement("button");
        deleteButton.type = "button";
        deleteButton.className = "danger-button delete-record";
        deleteButton.dataset.id = record.id;
        deleteButton.textContent = "删除";
        actionCell.appendChild(deleteButton);
        row.appendChild(actionCell);

        recordList.appendChild(row);
      });

      updateSummary(visibleRecords);
    }

    function updateSummary(visibleRecords) {
      const incomeSum = visibleRecords.reduce((sum, record) => sum + record.inAmount, 0);
      const expenseSum = visibleRecords.reduce((sum, record) => sum + record.outAmount, 0);
      const balanceSum = incomeSum - expenseSum;

      totalIncome.textContent = formatMoney(incomeSum);
      totalExpense.textContent = formatMoney(expenseSum);
      balance.textContent = formatMoney(balanceSum);
    }

    loginForm.addEventListener("submit", function (event) {
      event.preventDefault();

      const employeeNumber = employeeNumberInput.value.trim().toUpperCase();
      if (!employeeNumber) {
        alert("请输入员工号。");
        return;
      }

      showApp(employeeNumber);
      loginForm.reset();
    });

    logoutButton.addEventListener("click", showLogin);

    form.addEventListener("submit", function (event) {
      event.preventDefault();

      const inAmount = Number(inAmountInput.value || 0);
      const outAmount = Number(outAmountInput.value || 0);

      if (inAmount === 0 && outAmount === 0) {
        alert("In（收）和 Out（出）至少填写一项。");
        return;
      }

      const record = {
        id: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
        employeeNumber: activeEmployeeNumber,
        bank: activeBank,
        date: getTodayDate(),
        time: timeInput.value,
        ref: refInput.value.trim(),
        inAmount,
        outAmount
      };

      records.unshift(record);
      saveRecords();
      renderRecords();
      form.reset();
    });

    bankTabs.addEventListener("click", function (event) {
      if (!event.target.classList.contains("bank-tab")) {
        return;
      }

      setActiveBank(event.target.dataset.bank);
    });

    recordList.addEventListener("click", function (event) {
      if (!event.target.classList.contains("delete-record")) {
        return;
      }

      const recordId = event.target.dataset.id;
      const index = records.findIndex((record) => record.id === recordId);
      if (index === -1) {
        return;
      }

      records.splice(index, 1);
      saveRecords();
      renderRecords();
    });

    clearAllButton.addEventListener("click", function () {
      if (!confirm(`确定要删除 ${activeBank} 的全部账目记录吗？`)) {
        return;
      }

      records = records.filter((record) => {
        return record.employeeNumber !== activeEmployeeNumber || record.bank !== activeBank;
      });
      saveRecords();
      renderRecords();
    });

    if (activeEmployeeNumber) {
      showApp(activeEmployeeNumber);
    } else {
      showLogin();
    }
  </script>
</body>
</html>
