<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公司账目管理系统</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      color: #1f2937;
      background: linear-gradient(135deg, #eef2ff 0%, #f8fafc 55%, #e0f2fe 100%);
    }

    .page {
      width: min(1100px, calc(100% - 32px));
      margin: 0 auto;
      padding: 40px 0;
    }

    .hidden {
      display: none !important;
    }

    .header {
      margin-bottom: 24px;
      text-align: center;
    }

    .header h1 {
      margin: 0 0 8px;
      font-size: 32px;
      color: #0f172a;
    }

    .header p {
      margin: 0;
      color: #64748b;
    }

    .card {
      margin-bottom: 24px;
      padding: 24px;
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
    }

    .login-card {
      width: min(420px, calc(100% - 32px));
      margin: 80px auto;
    }

    .login-card h2 {
      margin: 0 0 8px;
      text-align: center;
      color: #0f172a;
    }

    .login-card .subtitle {
      margin: 0 0 24px;
      text-align: center;
      color: #64748b;
      font-size: 14px;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }

    label {
      font-weight: 700;
      color: #334155;
    }

    input,
    select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      font-size: 15px;
      background: #fff;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus,
    select:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      align-items: end;
    }

    .button-row {
      display: flex;
      gap: 12px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(15, 23, 42, 0.12);
    }

    .primary-button {
      color: #fff;
      background: #2563eb;
    }

    .secondary-button {
      color: #334155;
      background: #e2e8f0;
    }

    .danger-button {
      color: #fff;
      background: #dc2626;
    }

    .full-width-button {
      width: 100%;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .user-info {
      padding: 12px 18px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid #e2e8f0;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
    }

    .user-info strong {
      color: #0f172a;
    }

    .user-info span {
      color: #64748b;
      font-size: 14px;
    }

    .bank-tabs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .bank-tab {
      padding: 10px 18px;
      border-radius: 999px;
      border: 1px solid #cbd5e1;
      background: #fff;
      color: #334155;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .bank-tab:hover {
      border-color: #2563eb;
      color: #2563eb;
    }

    .bank-tab.active {
      background: #2563eb;
      border-color: #2563eb;
      color: #fff;
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.25);
    }

    .bank-title {
      margin: 0 0 16px;
      font-size: 20px;
      color: #0f172a;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .summary-item {
      padding: 18px;
      border-radius: 16px;
      background: #fff;
      border: 1px solid #e2e8f0;
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.06);
    }

    .summary-item span {
      display: block;
      margin-bottom: 8px;
      color: #64748b;
      font-size: 14px;
    }

    .summary-item strong {
      font-size: 24px;
    }

    .income {
      color: #16a34a;
    }

    .expense {
      color: #dc2626;
    }

    .balance {
      color: #2563eb;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 680px;
    }

    th,
    td {
      padding: 14px 12px;
      border-bottom: 1px solid #e2e8f0;
      text-align: left;
    }

    th {
      background: #f8fafc;
      color: #475569;
      font-size: 14px;
    }

    tbody tr:hover {
      background: #f8fafc;
    }

    .empty {
      padding: 28px 12px;
      text-align: center;
      color: #94a3b8;
    }

    .delete-record {
      padding: 8px 12px;
      font-size: 13px;
    }

    .login-hint {
      margin-top: 20px;
      padding: 14px;
      border-radius: 12px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      font-size: 13px;
      color: #64748b;
      line-height: 1.7;
    }

    .login-hint code {
      padding: 2px 6px;
      border-radius: 6px;
      background: #e2e8f0;
      color: #334155;
    }

    .error-message {
      margin-bottom: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #b91c1c;
      font-size: 14px;
    }

    @media (max-width: 900px) {
      .form-grid,
      .summary {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 620px) {
      .page {
        width: min(100% - 20px, 1100px);
        padding: 24px 0;
      }

      .card,
      .login-card {
        padding: 18px;
      }

      .form-grid,
      .summary {
        grid-template-columns: 1fr;
      }

      .header h1 {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>
  <!-- 登录页面 -->
  <section id="loginPage" class="login-card card">
    <h2>公司账目管理系统</h2>
    <p class="subtitle">请使用员工号登录</p>

    <div id="loginError" class="error-message hidden"></div>

    <form id="loginForm">
      <div class="form-field">
        <label for="employeeId">员工号</label>
        <input type="text" id="employeeId" placeholder="例如：EMP001" required autocomplete="username">
      </div>

      <div class="form-field">
        <label for="password">密码</label>
        <input type="password" id="password" placeholder="请输入密码" required autocomplete="current-password">
      </div>

      <button type="submit" class="primary-button full-width-button">登入</button>
    </form>

    <div class="login-hint">
      <strong>演示账号（仅供测试）：</strong><br>
      员工号 <code>EMP001</code>，密码 <code>123456</code>（张三）<br>
      员工号 <code>EMP002</code>，密码 <code>123456</code>（李四）<br>
      员工号 <code>EMP003</code>，密码 <code>123456</code>（王五）
    </div>
  </section>

  <!-- 主页面 -->
  <main id="mainPage" class="page hidden">
    <div class="top-bar">
      <div class="user-info">
        <strong id="userName">员工</strong><br>
        <span>员工号：<span id="userEmployeeId"></span></span>
      </div>
      <button type="button" id="logoutButton" class="secondary-button">退出登入</button>
    </div>

    <header class="header">
      <h1>公司账目管理系统</h1>
      <p>选择银行后，录入该银行的单据记录</p>
    </header>

    <nav class="bank-tabs" id="bankTabs" aria-label="银行选择"></nav>

    <section class="card">
      <h2 class="bank-title" id="currentBankTitle">当前银行</h2>

      <form id="recordForm">
        <div class="form-grid">
          <div class="form-field">
            <label for="time">时间</label>
            <input type="datetime-local" id="time" required>
          </div>

          <div class="form-field">
            <label for="ref">Ref（参考号）</label>
            <input type="text" id="ref" placeholder="例如：TXN20240629001" required>
          </div>

          <div class="form-field">
            <label for="inAmount">In（收入）</label>
            <input type="number" id="inAmount" min="0" step="0.01" placeholder="0.00">
          </div>

          <div class="form-field">
            <label for="outAmount">Out（支出）</label>
            <input type="number" id="outAmount" min="0" step="0.01" placeholder="0.00">
          </div>
        </div>

        <div class="button-row">
          <button type="submit" class="primary-button">添加单据</button>
          <button type="reset" class="secondary-button">清空输入</button>
          <button type="button" id="clearBankButton" class="danger-button">删除本银行全部记录</button>
        </div>
      </form>
    </section>

    <section class="summary" aria-label="当前银行汇总">
      <div class="summary-item">
        <span>总收入 (In)</span>
        <strong id="totalIn" class="income">¥0.00</strong>
      </div>
      <div class="summary-item">
        <span>总支出 (Out)</span>
        <strong id="totalOut" class="expense">¥0.00</strong>
      </div>
      <div class="summary-item">
        <span>结余</span>
        <strong id="balance" class="balance">¥0.00</strong>
      </div>
    </section>

    <section class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>时间</th>
              <th>Ref</th>
              <th>In（收入）</th>
              <th>Out（支出）</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="recordList"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "companyAccountData";
    const SESSION_KEY = "companyAccountSession";

    const BANKS = [
      "中国银行",
      "工商银行",
      "建设银行",
      "招商银行",
      "农业银行"
    ];

    const EMPLOYEES = {
      EMP001: { name: "张三", password: "123456" },
      EMP002: { name: "李四", password: "123456" },
      EMP003: { name: "王五", password: "123456" }
    };

    const loginPage = document.getElementById("loginPage");
    const mainPage = document.getElementById("mainPage");
    const loginForm = document.getElementById("loginForm");
    const loginError = document.getElementById("loginError");
    const employeeIdInput = document.getElementById("employeeId");
    const passwordInput = document.getElementById("password");
    const logoutButton = document.getElementById("logoutButton");
    const userName = document.getElementById("userName");
    const userEmployeeId = document.getElementById("userEmployeeId");
    const bankTabs = document.getElementById("bankTabs");
    const currentBankTitle = document.getElementById("currentBankTitle");
    const recordForm = document.getElementById("recordForm");
    const timeInput = document.getElementById("time");
    const refInput = document.getElementById("ref");
    const inAmountInput = document.getElementById("inAmount");
    const outAmountInput = document.getElementById("outAmount");
    const recordList = document.getElementById("recordList");
    const totalIn = document.getElementById("totalIn");
    const totalOut = document.getElementById("totalOut");
    const balance = document.getElementById("balance");
    const clearBankButton = document.getElementById("clearBankButton");

    let currentUser = null;
    let currentBank = BANKS[0];
    let allData = loadAllData();

    function loadAllData() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) {
        return {};
      }

      try {
        return JSON.parse(saved);
      } catch (error) {
        return {};
      }
    }

    function saveAllData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(allData));
    }

    function loadSession() {
      const saved = sessionStorage.getItem(SESSION_KEY);
      if (!saved) {
        return null;
      }

      try {
        return JSON.parse(saved);
      } catch (error) {
        return null;
      }
    }

    function saveSession(user) {
      sessionStorage.setItem(SESSION_KEY, JSON.stringify(user));
    }

    function clearSession() {
      sessionStorage.removeItem(SESSION_KEY);
    }

    function getUserRecords() {
      if (!currentUser) {
        return [];
      }

      if (!allData[currentUser.employeeId]) {
        allData[currentUser.employeeId] = {};
      }

      if (!allData[currentUser.employeeId][currentBank]) {
        allData[currentUser.employeeId][currentBank] = [];
      }

      return allData[currentUser.employeeId][currentBank];
    }

    function formatMoney(amount) {
      return `¥${Number(amount).toFixed(2)}`;
    }

    function formatDateTime(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) {
        return value;
      }

      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      const hours = String(date.getHours()).padStart(2, "0");
      const minutes = String(date.getMinutes()).padStart(2, "0");

      return `${year}-${month}-${day} ${hours}:${minutes}`;
    }

    function setNowAsDefaultTime() {
      const now = new Date();
      now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
      timeInput.value = now.toISOString().slice(0, 16);
    }

    function showLoginError(message) {
      loginError.textContent = message;
      loginError.classList.remove("hidden");
    }

    function hideLoginError() {
      loginError.textContent = "";
      loginError.classList.add("hidden");
    }

    function showLoginPage() {
      loginPage.classList.remove("hidden");
      mainPage.classList.add("hidden");
      hideLoginError();
      loginForm.reset();
    }

    function showMainPage() {
      loginPage.classList.add("hidden");
      mainPage.classList.remove("hidden");
      userName.textContent = currentUser.name;
      userEmployeeId.textContent = currentUser.employeeId;
      renderBankTabs();
      renderRecords();
      setNowAsDefaultTime();
    }

    function renderBankTabs() {
      bankTabs.innerHTML = "";

      BANKS.forEach(function (bank) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "bank-tab" + (bank === currentBank ? " active" : "");
        button.textContent = bank;
        button.addEventListener("click", function () {
          currentBank = bank;
          renderBankTabs();
          renderRecords();
          setNowAsDefaultTime();
        });
        bankTabs.appendChild(button);
      });

      currentBankTitle.textContent = currentBank + " — 单据录入";
    }

    function renderRecords() {
      const records = getUserRecords();
      recordList.innerHTML = "";

      if (records.length === 0) {
        recordList.innerHTML = '<tr><td class="empty" colspan="5">暂无单据，请先添加一条记录。</td></tr>';
        updateSummary();
        return;
      }

      records.forEach(function (record, index) {
        const row = document.createElement("tr");

        const cells = [
          formatDateTime(record.time),
          record.ref,
          formatMoney(record.inAmount),
          formatMoney(record.outAmount)
        ];

        cells.forEach(function (value, cellIndex) {
          const cell = document.createElement("td");
          cell.textContent = value;

          if (cellIndex === 2) {
            cell.className = "income";
          }

          if (cellIndex === 3) {
            cell.className = "expense";
          }

          row.appendChild(cell);
        });

        const actionCell = document.createElement("td");
        const deleteButton = document.createElement("button");
        deleteButton.type = "button";
        deleteButton.className = "danger-button delete-record";
        deleteButton.dataset.index = index;
        deleteButton.textContent = "删除";
        actionCell.appendChild(deleteButton);
        row.appendChild(actionCell);

        recordList.appendChild(row);
      });

      updateSummary();
    }

    function updateSummary() {
      const records = getUserRecords();
      const inSum = records.reduce(function (sum, record) {
        return sum + record.inAmount;
      }, 0);
      const outSum = records.reduce(function (sum, record) {
        return sum + record.outAmount;
      }, 0);

      totalIn.textContent = formatMoney(inSum);
      totalOut.textContent = formatMoney(outSum);
      balance.textContent = formatMoney(inSum - outSum);
    }

    loginForm.addEventListener("submit", function (event) {
      event.preventDefault();
      hideLoginError();

      const employeeId = employeeIdInput.value.trim().toUpperCase();
      const password = passwordInput.value;
      const employee = EMPLOYEES[employeeId];

      if (!employee) {
        showLoginError("员工号不存在，请检查后重试。");
        return;
      }

      if (employee.password !== password) {
        showLoginError("密码错误，请重试。");
        return;
      }

      currentUser = {
        employeeId: employeeId,
        name: employee.name
      };

      saveSession(currentUser);
      showMainPage();
    });

    recordForm.addEventListener("submit", function (event) {
      event.preventDefault();

      const inAmount = Number(inAmountInput.value || 0);
      const outAmount = Number(outAmountInput.value || 0);

      if (inAmount === 0 && outAmount === 0) {
        alert("In 和 Out 至少填写一项。");
        return;
      }

      const record = {
        time: timeInput.value,
        ref: refInput.value.trim(),
        inAmount: inAmount,
        outAmount: outAmount
      };

      const records = getUserRecords();
      records.unshift(record);
      saveAllData();
      renderRecords();

      refInput.value = "";
      inAmountInput.value = "";
      outAmountInput.value = "";
      setNowAsDefaultTime();
    });

    recordList.addEventListener("click", function (event) {
      if (!event.target.classList.contains("delete-record")) {
        return;
      }

      const index = Number(event.target.dataset.index);
      const records = getUserRecords();
      records.splice(index, 1);
      saveAllData();
      renderRecords();
    });

    clearBankButton.addEventListener("click", function () {
      if (!confirm("确定要删除「" + currentBank + "」的全部单据记录吗？")) {
        return;
      }

      allData[currentUser.employeeId][currentBank] = [];
      saveAllData();
      renderRecords();
    });

    logoutButton.addEventListener("click", function () {
      currentUser = null;
      clearSession();
      showLoginPage();
    });

    const savedSession = loadSession();
    if (savedSession && EMPLOYEES[savedSession.employeeId]) {
      currentUser = savedSession;
      showMainPage();
    } else {
      showLoginPage();
    }
  </script>
</body>
</html>
